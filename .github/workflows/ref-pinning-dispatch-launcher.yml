name: Ref Pinning Dispatch Launcher

on:
  push:
    branches:
      - lab/ref-dispatch
    paths:
      - dispatch-trigger.txt

permissions:
  actions: write
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch target workflow on selected branch
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          API_URL: ${{ github.api_url }}
        run: |
          set -euo pipefail
          curl --fail-with-body --silent --show-error \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${API_URL}/repos/${REPOSITORY}/actions/workflows/ref-pinning-dispatch-target.yml/dispatches" \
            -d '{"ref":"lab/ref-dispatch"}'
