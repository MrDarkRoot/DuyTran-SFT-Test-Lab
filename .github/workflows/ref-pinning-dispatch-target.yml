name: Ref Pinning Dispatch Target

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  advance-ref:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dispatched commit
        uses: actions/checkout@v5

      - name: Advance selected branch after dispatch event exists
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          printf 'advanced by workflow_dispatch run %s\n' "$GITHUB_RUN_ID" > dispatch-ref-advanced.txt
          git add dispatch-ref-advanced.txt
          git commit -m "lab: advance dispatched ref [skip ci]"
          git push origin "HEAD:${GITHUB_REF_NAME}"

  checkout-event:
    needs: advance-ref
    runs-on: ubuntu-latest
    steps:
      - name: Checkout using workflow_dispatch defaults after branch moved
        uses: actions/checkout@v5

      - name: Verify dispatched source identity
        shell: bash
        run: |
          set -euo pipefail
          EVENT_SHA="$GITHUB_SHA"
          CHECKED_OUT_SHA="$(git rev-parse HEAD)"
          git fetch origin "$GITHUB_REF_NAME"
          REMOTE_SHA="$(git rev-parse "origin/$GITHUB_REF_NAME")"

          printf 'EVENT_SHA=%s\nCHECKED_OUT_SHA=%s\nREMOTE_SHA=%s\n' \
            "$EVENT_SHA" "$CHECKED_OUT_SHA" "$REMOTE_SHA"

          test "$CHECKED_OUT_SHA" = "$EVENT_SHA"
          test "$REMOTE_SHA" != "$EVENT_SHA"
